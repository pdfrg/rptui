version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - staticcheck
    - ineffassign
    - gocritic
    - revive

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    gocritic:
      disabled-checks:
        - singleCaseSwitch
        - ifElseChain
    revive:
      rules:
        - name: unused-parameter
          disabled: true
