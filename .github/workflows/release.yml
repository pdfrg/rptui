name: Release

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Verify version injection
      run: |
        go build -ldflags "-X main.Version=test-version-check" -o /tmp/rptui-test ./cmd/rptui
        OUTPUT=$(/tmp/rptui-test --version 2>&1)
        echo "Reported version: $OUTPUT"
        echo "$OUTPUT" | grep -q "test-version-check" || (echo "ERROR: Version injection failed!" && exit 1)

    - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: v1.26.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LASTFM_KEY: ${{ secrets.LASTFM_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}